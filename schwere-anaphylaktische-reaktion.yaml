algorithmus: "Schwere anaphylaktische Reaktion"
kommentar: ""

symptome:
  - ganzer_text: "Ereignisbezogener Zusammenhang (Insektenstich, Medikamente, Nahrungsmittel, etc.) Schwere Atemnot, Stridor, Bronchospasmus oder Schocksymptome eventuell Hautsymptome"

# AML1 und AML2 Anwendungsschalter
kinderanwendung_aml1: true
erwachsenenanwendung_aml1: true
kinderanwendung_aml2: true
erwachsenenanwendung_aml2: true

# AML1 Anwendungen
kinder_aml1:
  kommentar: ""
  notarzt: "alarmieren"
  notarzt_kommentar: ""
  kontraindikationen: []
  
  wirkstoffe:
    - name: "Epinephrin"
      handelsname: "EpiPen Junior"
      kontraindikationen:
        - "Allergie / Unverträglichkeit"
        - "unter 15 kg KG / 3. LJ"
      dosierungsgruppen:
        - gewichtsklasse: "15–30 kg KG / 3.–12. LJ"
          dosierung: "150 µg"
          applikation: "i.m. Autoinjektor"
        - gewichtsklasse: "über 30 kg KG / über 12. LJ"
          dosierung: "300 µg"
          applikation: "i.m. Autoinjektor"


erwachsene_aml1:
  kommentar: ""
  notarzt: "alarmieren"
  notarzt_kommentar: ""
  kontraindikationen: []
  
  wirkstoffe:
    - name: "Epinephrin"
      handelsname: "EpiPen"
      kontraindikationen:
        - "Allergie / Unverträglichkeit"
      dosierungsgruppen:
        - gewichtsklasse: "keine"
          dosierung: "300 µg"
          applikation: "i.m. Autoinjektor"


# AML2 Anwendungen
kinder_aml2:
  kommentar: ""
  notarzt: "alarmieren"
  notarzt_kommentar: ""
  kontraindikationen: []
  
  wirkstoffe:
    - name: "Epinephrin"
      handelsname: "Adrenalin Pädia"
      kontraindikationen:
        - "Allergie / Unverträglichkeit"
      dosierungsgruppen:
        - gewichtsklasse: "unter 50 kg KG"
          dosierung: "10 µg / kg KG (=0,05 ml / kg KG)"
          applikation: "i.m."
        - gewichtsklasse: "über 50 kg KG"
          dosierung: "500 µg (0,5 ml)"
          applikation: "i.m."
    
    - name: "Elektrolytlösung"
      handelsname: "Elo-Mel isoton"
      kontraindikationen:
        - "Allergie / Unverträglichkeit"
        - "unter 6. LJ"
      dosierungsgruppen:
        - gewichtsklasse: "keine"
          dosierung: "10 ml/kg KG (max. 500 ml)"
          applikation: "i.v."


erwachsene_aml2:
  kommentar: ""
  notarzt: "alarmieren"
  notarzt_kommentar: ""
  kontraindikationen: []
  
  wirkstoffe:
    - name: "Epinephrin"
      handelsname: "Adrenalin Pädia"
      kontraindikationen:
        - "Allergie / Unverträglichkeit"
      dosierungsgruppen:
        - gewichtsklasse: "keine"
          dosierung: "500 µg"
          applikation: "i.m."
    
    - name: "Elektrolytlösung"
      handelsname: "Elo-Mel isoton"
      kontraindikationen:
        - "Allergie / Unverträglichkeit"
      dosierungsgruppen:
        - gewichtsklasse: "keine"
          dosierung: "500 ml"
          applikation: "i.v."
