algorithmus: "Schwellung der oberen Atemwege"
kommentar: ""

symptome:
  - ganzer_text: "Ereignisbezogener Zusammenhang (Inhalationstrauma, Insektenstich im Mundbereich, allergische Atemwegsschwellung oder allergischer Bronchospasmus) Schwellung der oberen Atemwege, Stridor, Giemen, Brummen, Pfeifen, Heiserkeit, Atemnot, Atemhilfsmuskulatur, erhöhte Atemfrequenz, Krupp-Syndrom"

# AML1 und AML2 Anwendungsschalter
kinderanwendung_aml1: true
erwachsenenanwendung_aml1: true
kinderanwendung_aml2: false
erwachsenenanwendung_aml2: false

# AML1 Anwendungen
kinder_aml1:
  kommentar: ""
  notarzt: "alarmieren"
  notarzt_kommentar: ""
  kontraindikationen: []
  
  wirkstoffe:
    - name: "Epinephrin"
      handelsname: "Adrenalin Pädia"
      kontraindikationen:
        - "Allergie / Unverträglichkeit"
        - "unter 15 kg KG / 8. LJ"
        - "Tachy/arrhythmie > 120/min"
        - "kardio-pulmonale Risikofaktoren"
      dosierungsgruppen:
        - gewichtsklasse: "über 15 kg KG / 8. LJ"
          dosierung: "3 mg (=3 ml)"
          applikation: "inhalativ"


erwachsene_aml1:
  kommentar: ""
  notarzt: "alarmieren"
  notarzt_kommentar: ""
  kontraindikationen: []
  
  wirkstoffe:
    - name: "Epinephrin"
      handelsname: "Adrenalin Pädia"
      kontraindikationen:
        - "Allergie / Unverträglichkeit"
        - "Tachy/arrhythmie > 120/min"
        - "kardio-pulmonale Risikofaktoren"
      dosierungsgruppen:
        - gewichtsklasse: "keine"
          dosierung: "3 mg (=3 ml)"
          applikation: "inhalativ"


